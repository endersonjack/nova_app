{% extends "base.html" %}
{% block title %}Usuários{% endblock %}
{% block page_title %}Usuários{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
    <div>
      <h2 class="h5 mb-1">Gestão de usuários</h2>
      <p class="text-muted mb-0 small">Cadastros e permissões aparecerão aqui.</p>
    </div>
    <button type="button" class="btn btn-app btn-app-primary" disabled>
      <i class="bi bi-person-plus me-1"></i> Novo usuário
    </button>
  </div>
</div>
<div class="card border-0 shadow-sm mt-4">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Função</th>
          <th class="text-end">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" class="text-center text-muted py-5">Nenhum registro ainda.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

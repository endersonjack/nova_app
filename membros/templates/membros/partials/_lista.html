<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th class="text-end" style="width:7rem;">Ações</th>
          </tr>
        </thead>
        <tbody>
          {% for m in membros %}
          <tr>
            <td class="fw-medium">{{ m.nome_conhecido|default:m.nome_completo }}</td>
            <td class="text-muted small">{{ m.email|default:"—" }}</td>
            <td class="text-muted small">{{ m.telefone|default:"—" }}</td>
            <td class="text-end">
              <a href="{% url 'membros:detalhe' m.pk %}"
                 class="btn btn-app btn-app-secondary btn-sm"
                 title="Abrir registro completo">
                <i class="bi bi-pencil"></i>
              </a>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="4" class="text-center text-muted py-5">Nenhum membro cadastrado.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

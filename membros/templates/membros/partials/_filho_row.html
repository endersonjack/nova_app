{% load i18n %}
{# item: dict com id e label, ou None para linha vazia; filhos_queryset: QuerySet de Membro #}
<div class="col-md-6 js-filho-row" data-idx="{{ idx }}">
  <div class="membro-field-shell border rounded-3 px-3 py-2">
    <label class="membro-field-label visually-hidden" for="filho_select_{{ idx }}">{% trans "Filho(a)" %} {{ idx|add:1 }}</label>
    <select name="filhos"
            id="filho_select_{{ idx }}"
            class="form-select rounded-3 js-filho-select"
            aria-label="{% trans 'Selecionar filho(a)' %}">
      <option value="">{% trans "Selecione…" %}</option>
      {% for m in filhos_queryset %}
        <option value="{{ m.pk }}"
                {% if item %}{% if item.id == m.pk or item.id|stringformat:"s" == m.pk|stringformat:"s" %} selected{% endif %}{% endif %}>{{ m }}</option>
      {% endfor %}
    </select>
  </div>
</div>

{# Skeleton para lista (tabela + busca) #}
<div class="card border-0 shadow-sm">
  <div class="card-body py-3 border-bottom border-light placeholder-glow" aria-hidden="true">
    <span class="placeholder col-4 col-md-3 rounded-pill d-block mb-2" style="height: 0.75rem; max-width: 10rem;"></span>
    <span class="placeholder col-12 rounded-3 d-block" style="height: 2.5rem;"></span>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="text-center" style="width:3rem;">#</th>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Nascimento</th>
            <th>E-mail</th>
            <th class="text-center" style="width:4rem;">Maps</th>
          </tr>
        </thead>
        <tbody>
          {% for i in "12345678" %}
          <tr class="placeholder-glow">
            <td class="text-center"><span class="placeholder col-6 rounded-pill mx-auto d-block"></span></td>
            <td><span class="placeholder col-10 rounded-pill"></span></td>
            <td><span class="placeholder col-8 rounded-pill"></span></td>
            <td><span class="placeholder col-6 rounded-pill"></span></td>
            <td><span class="placeholder col-9 rounded-pill"></span></td>
            <td class="text-center"><span class="placeholder rounded-circle d-inline-block" style="width:2rem;height:2rem;"></span></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-body py-3">
  <form class="app-modal-form membro-secao-form"
        method="post"
        hx-post="{{ action_url }}"
        hx-target="#app-modal-content"
        hx-swap="innerHTML"
        hx-indicator="#app-modal-indicator"
        hx-disabled-elt="find button[type=submit]">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="alert alert-danger rounded-3">{{ form.non_field_errors }}</div>
    {% endif %}

    <div class="row g-3">
      <div class="col-md-6">
        <div class="membro-field-shell border rounded-3 px-3 py-2">
          <label class="membro-field-label" for="{{ form.locomocao.id_for_label }}">{{ form.locomocao.label }}</label>
          {{ form.locomocao }}
          {% for err in form.locomocao.errors %}<div class="text-danger small mt-1">{{ err }}</div>{% endfor %}
        </div>
      </div>
      <div class="col-12">
        <div class="membro-field-shell border rounded-3 px-3 py-2">
          <label class="membro-field-label" for="{{ form.observacoes.id_for_label }}">{{ form.observacoes.label }}</label>
          {{ form.observacoes }}
          {% for err in form.observacoes.errors %}<div class="text-danger small mt-1">{{ err }}</div>{% endfor %}
        </div>
      </div>
    </div>

    <div class="modal-footer border-top mt-3 px-0 pb-0 pt-3 flex-wrap gap-2">
      <span id="app-modal-indicator" class="htmx-indicator spinner-border spinner-border-sm text-primary me-auto" role="status" aria-hidden="true"></span>
      <button type="button" class="btn btn-app btn-app-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
      <button type="submit" class="btn btn-app btn-app-primary btn-sm px-3">Salvar</button>
    </div>
  </form>
</div>

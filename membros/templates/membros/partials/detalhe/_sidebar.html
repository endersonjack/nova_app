{% comment %}secao_ativa: dados-pessoais | familia | batismo | informacoes | ministerios{% endcomment %}
<div class="membro-detalhe-sidebar card border-0 shadow-sm h-100">
  <div class="card-body p-3">
    <p class="small fw-semibold text-dark mb-0">Dados do membro</p>
    <p class="text-muted small mb-3">Escolha a seção</p>
    <div class="list-group list-group-flush membro-detalhe-nav rounded-3 border">
      <a href="#"
         class="list-group-item list-group-item-action membro-detalhe-nav-item d-flex align-items-center gap-2 py-2 {% if secao_ativa == 'dados-pessoais' %}active{% endif %}"
         hx-get="{% url 'membros:secao' membro.pk 'dados-pessoais' %}"
         hx-target="#membro-detalhe-main"
         hx-swap="innerHTML"
         hx-indicator="#membro-secao-indicator"
         hx-on:click="document.querySelectorAll('.membro-detalhe-nav-item').forEach(function(el){el.classList.remove('active');}); this.classList.add('active');">
        <i class="bi bi-person-vcard"></i> Dados pessoais
      </a>
      <a href="#"
         class="list-group-item list-group-item-action membro-detalhe-nav-item d-flex align-items-center gap-2 py-2 {% if secao_ativa == 'familia' %}active{% endif %}"
         hx-get="{% url 'membros:secao' membro.pk 'familia' %}"
         hx-target="#membro-detalhe-main"
         hx-swap="innerHTML"
         hx-indicator="#membro-secao-indicator"
         hx-on:click="document.querySelectorAll('.membro-detalhe-nav-item').forEach(function(el){el.classList.remove('active');}); this.classList.add('active');">
        <i class="bi bi-people"></i> Família
      </a>
      <a href="#"
         class="list-group-item list-group-item-action membro-detalhe-nav-item d-flex align-items-center gap-2 py-2 {% if secao_ativa == 'batismo' %}active{% endif %}"
         hx-get="{% url 'membros:secao' membro.pk 'batismo' %}"
         hx-target="#membro-detalhe-main"
         hx-swap="innerHTML"
         hx-indicator="#membro-secao-indicator"
         hx-on:click="document.querySelectorAll('.membro-detalhe-nav-item').forEach(function(el){el.classList.remove('active');}); this.classList.add('active');">
        <i class="bi bi-droplet"></i> Batismo
      </a>
      <a href="#"
         class="list-group-item list-group-item-action membro-detalhe-nav-item d-flex align-items-center gap-2 py-2 {% if secao_ativa == 'informacoes' %}active{% endif %}"
         hx-get="{% url 'membros:secao' membro.pk 'informacoes' %}"
         hx-target="#membro-detalhe-main"
         hx-swap="innerHTML"
         hx-indicator="#membro-secao-indicator"
         hx-on:click="document.querySelectorAll('.membro-detalhe-nav-item').forEach(function(el){el.classList.remove('active');}); this.classList.add('active');">
        <i class="bi bi-info-circle"></i> Informações
      </a>
      <a href="#"
         class="list-group-item list-group-item-action membro-detalhe-nav-item d-flex align-items-center gap-2 py-2 {% if secao_ativa == 'ministerios' %}active{% endif %}"
         hx-get="{% url 'membros:secao' membro.pk 'ministerios' %}"
         hx-target="#membro-detalhe-main"
         hx-swap="innerHTML"
         hx-indicator="#membro-secao-indicator"
         hx-on:click="document.querySelectorAll('.membro-detalhe-nav-item').forEach(function(el){el.classList.remove('active');}); this.classList.add('active');">
        <i class="bi bi-diagram-3"></i> Ministérios
      </a>
    </div>
  </div>
</div>

{% if q|length < 2 %}
<p class="text-muted small mb-0 px-3 py-2">Digite pelo menos 2 letras para buscar.</p>
{% elif membros %}
<div class="list-group list-group-flush py-1">
  {% for m in membros %}
  <button type="button"
          class="list-group-item list-group-item-action border-0 py-2 px-3 text-start js-autocomplete-pick"
          data-membro-id="{{ m.pk }}"
          data-membro-label="{{ m.nome_conhecido|default:m.nome_completo }}{% if m.email %} — {{ m.email }}{% endif %}">
    <span class="fw-semibold text-dark">{{ m.nome_conhecido|default:m.nome_completo }}</span>
    <span class="text-muted small d-block">{{ m.email|default:"" }}</span>
  </button>
  {% endfor %}
</div>
{% else %}
<p class="text-muted small mb-0 px-3 py-2">Nenhum membro encontrado.</p>
{% endif %}

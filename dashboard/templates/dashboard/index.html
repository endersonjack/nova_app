{% extends "base.html" %}
{% load static %}
{% block title %}Início{% endblock %}
{% block page_title %}Início{% endblock %}

{% block content %}
<div class="position-relative">
  <span id="dashboard-inicio-ind"
        class="htmx-indicator position-absolute top-0 end-0 mt-n1 me-1 spinner-border spinner-border-sm text-primary z-1"
        role="status"
        aria-hidden="true"></span>
  <div id="dashboard-inicio-wrap"
       hx-get="{% url 'dashboard_inicio_conteudo' %}"
       hx-trigger="load"
       hx-swap="innerHTML"
       hx-indicator="#dashboard-inicio-ind">
    {% include "dashboard/partials/_inicio_skeleton.html" %}
  </div>
</div>
{% endblock %}

{% block extra_js %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script src="{% static 'js/dashboard-inicio.js' %}"></script>
{% endblock %}

{# Skeleton: total + aniversariantes #}
<div class="row g-4 align-items-stretch placeholder-glow" aria-hidden="true">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex flex-column justify-content-center py-4">
        <span class="placeholder col-6 mb-3 rounded-pill" style="height: 0.75rem; max-width: 8rem;"></span>
        <span class="placeholder col-10 mb-2 rounded-3" style="height: 3rem;"></span>
        <span class="placeholder col-5 rounded-pill" style="height: 0.7rem; max-width: 7rem;"></span>
      </div>
    </div>
  </div>
  <div class="col-md-6 col-lg-7">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body">
        <span class="placeholder col-7 mb-3 rounded-pill" style="height: 1rem; max-width: 14rem;"></span>
        <span class="placeholder col-5 mb-3 rounded-pill d-block" style="height: 0.65rem; max-width: 10rem;"></span>
        {% for i in "1234" %}
          <div class="d-flex align-items-center gap-3 py-2 border-bottom border-light">
            <span class="placeholder rounded col-1" style="height: 0.85rem; max-width: 2rem;"></span>
            <span class="placeholder rounded-pill col-7" style="height: 0.75rem;"></span>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
